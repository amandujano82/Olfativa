<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Olfativa · Cotizador</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="auth.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #050505;
    font-family: 'Inter Tight', system-ui, sans-serif;
    color: #F3EDE3;
    overflow: hidden;
  }
  * { box-sizing: border-box; }
  deck-stage section { background: #0E0E0E; }

  /* ── Top bar siempre visible ────────────────────────────── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    height: 56px; padding: 0 20px;
    background: rgba(14, 14, 14, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(243, 237, 227, 0.1);
    display: flex; align-items: center; justify-content: space-between;
    color: #F3EDE3;
    font-family: 'Inter Tight', system-ui, sans-serif;
  }
  .topbar-left, .topbar-right { display: flex; align-items: center; gap: 14px; }
  .topbar-logo {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-weight: 500; font-size: 22px;
    letter-spacing: 0.01em; color: #F3EDE3;
  }
  .topbar-logo span {
    font-family: 'Inter Tight', sans-serif; font-style: normal;
    font-size: 9px; vertical-align: super; color: #C7A668; margin-left: 1px;
  }
  .topbar-divider {
    width: 1px; height: 24px;
    background: rgba(243, 237, 227, 0.15);
  }
  .topbar-meta { display: flex; flex-direction: column; gap: 2px; }
  .topbar-meta-eyebrow {
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(243, 237, 227, 0.45); font-weight: 500;
  }
  .topbar-client-display {
    color: #F3EDE3; font-size: 13.5px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .topbar-client-name { color: #F3EDE3; }
  .topbar-client-id { color: rgba(243, 237, 227, 0.5); font-weight: 400; font-size: 12px; }
  .btn-edit {
    background: rgba(199, 166, 104, 0.12) !important;
    border-color: rgba(199, 166, 104, 0.4) !important;
    color: #C7A668 !important;
  }
  .btn-edit:hover {
    background: rgba(199, 166, 104, 0.22) !important;
    color: #F3EDE3 !important;
  }

  .btn-primary, .btn-secondary, .btn-tertiary {
    appearance: none; cursor: pointer; font-family: inherit;
    border-radius: 6px; transition: all 160ms;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary {
    background: #C7A668; color: #0E0E0E;
    border: 1px solid #C7A668;
    padding: 9px 16px; font-size: 12.5px; font-weight: 600;
    letter-spacing: 0.04em;
  }
  .btn-primary:hover { background: #d4b376; }
  .btn-secondary {
    background: rgba(243, 237, 227, 0.06);
    color: #F3EDE3;
    border: 1px solid rgba(243, 237, 227, 0.2);
    padding: 9px 14px; font-size: 12.5px; font-weight: 500;
  }
  .btn-secondary:hover { background: rgba(243, 237, 227, 0.12); }
  .btn-tertiary {
    background: transparent; color: rgba(243, 237, 227, 0.7);
    border: 1px solid rgba(243, 237, 227, 0.2);
    padding: 9px 12px; font-size: 14px;
  }
  .btn-tertiary:hover { color: #F3EDE3; border-color: rgba(243, 237, 227, 0.4); }
  .btn-icon { font-size: 14px; opacity: 0.85; }
  .btn-counter {
    background: rgba(14, 14, 14, 0.2); padding: 2px 7px; border-radius: 4px;
    font-size: 11px; font-weight: 500; margin-left: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* ── Deck area: deja espacio para el topbar ─────────────── */
  .deck-area { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; }
  deck-stage { top: 56px !important; }

  /* ── Picker overlay ─────────────────────────────────────── */
  .picker-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(5, 5, 5, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    animation: pickerFade 200ms ease;
  }
  @keyframes pickerFade { from { opacity: 0; } to { opacity: 1; } }
  .picker-modal, .client-modal {
    background: #131210;
    border: 1px solid rgba(243, 237, 227, 0.12);
    border-radius: 10px;
    width: 100%; max-width: 1180px;
    max-height: calc(100vh - 64px);
    display: flex; flex-direction: column;
    color: #F3EDE3;
    font-family: 'Inter Tight', system-ui, sans-serif;
    overflow: hidden;
  }
  .client-modal { max-width: 520px; }
  .picker-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 24px 32px; border-bottom: 1px solid rgba(243, 237, 227, 0.08);
    flex-shrink: 0;
  }
  .picker-eyebrow {
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #C7A668; font-weight: 500; margin-bottom: 6px;
  }
  .picker-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-weight: 400; font-size: 32px;
    margin: 0; letter-spacing: -0.01em; line-height: 1;
  }
  .picker-sub {
    font-size: 12px; color: rgba(243, 237, 227, 0.55);
    margin-top: 8px; line-height: 1.4;
  }
  .picker-close {
    appearance: none; background: transparent; border: 0;
    color: rgba(243, 237, 227, 0.5);
    font-size: 28px; cursor: pointer; padding: 0; line-height: 1;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; transition: all 160ms;
  }
  .picker-close:hover { color: #F3EDE3; background: rgba(243, 237, 227, 0.08); }

  .picker-presets {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 14px 32px; border-bottom: 1px solid rgba(243, 237, 227, 0.06);
    background: rgba(0, 0, 0, 0.2);
    flex-shrink: 0;
  }
  .picker-presets-label {
    font-size: 11px; color: rgba(243, 237, 227, 0.55);
    letter-spacing: 0.04em; margin-right: 4px;
  }
  .picker-preset-btn {
    appearance: none; cursor: pointer; font-family: inherit;
    background: rgba(243, 237, 227, 0.05);
    border: 1px solid rgba(243, 237, 227, 0.12);
    color: #F3EDE3; font-size: 11.5px; font-weight: 500;
    padding: 6px 11px; border-radius: 4px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 160ms;
  }
  .picker-preset-btn:hover { background: rgba(243, 237, 227, 0.1); }
  .picker-preset-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  .picker-grid {
    flex: 1; overflow-y: auto;
    padding: 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .picker-card {
    background: rgba(243, 237, 227, 0.03);
    border: 1px solid rgba(243, 237, 227, 0.08);
    border-radius: 8px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: all 200ms;
    opacity: 0.45;
  }
  .picker-card.is-on { opacity: 1; border-color: rgba(199, 166, 104, 0.35); }
  .picker-card.is-dragging { opacity: 0.4; transform: scale(0.97); cursor: grabbing; }
  .picker-card.is-dragover { border-color: #C7A668; box-shadow: 0 0 0 2px rgba(199, 166, 104, 0.4); }
  .picker-card-handle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    background: rgba(199, 166, 104, 0.08);
    border-bottom: 1px solid rgba(199, 166, 104, 0.18);
    cursor: grab; user-select: none;
  }
  .picker-card-handle:active { cursor: grabbing; }
  .handle-icon {
    color: rgba(199, 166, 104, 0.7); font-size: 13px;
    letter-spacing: -3px; font-weight: 700;
  }
  .handle-pos {
    font-size: 12px; font-weight: 600; color: #C7A668;
    font-variant-numeric: tabular-nums; letter-spacing: 0.04em;
  }
  .picker-card-thumb {
    height: 130px; position: relative;
    background-size: cover; background-position: center;
    background-color: #1A1815;
    cursor: pointer;
  }
  .picker-card-thumb::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
  }
  .picker-card-check {
    position: absolute; top: 10px; left: 10px; z-index: 2;
    width: 32px; height: 32px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #F3EDE3;
    backdrop-filter: blur(4px);
    transition: all 160ms;
  }
  .picker-card.is-on .picker-card-check {
    background: #C7A668; color: #0E0E0E;
  }
  .picker-card-thumb:hover .picker-card-check { transform: scale(1.05); }
  .picker-card-order {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    background: rgba(0, 0, 0, 0.6);
    color: #C7A668; font-size: 11px; font-weight: 600;
    padding: 4px 8px; border-radius: 4px;
    font-variant-numeric: tabular-nums;
    backdrop-filter: blur(4px);
  }
  .picker-card-body {
    padding: 14px 14px 12px;
    display: flex; flex-direction: column; gap: 6px;
    flex: 1; position: relative;
  }
  .picker-card-label {
    font-size: 13.5px; font-weight: 600; color: #F3EDE3;
    letter-spacing: -0.01em;
  }
  .picker-card-desc {
    font-size: 11.5px; color: rgba(243, 237, 227, 0.55);
    line-height: 1.4; flex: 1;
  }
  .picker-card-controls {
    display: flex; gap: 6px; align-items: center; margin-top: 8px;
  }
  .picker-card-select {
    appearance: none; cursor: pointer; font-family: inherit;
    background: rgba(243, 237, 227, 0.06);
    border: 1px solid rgba(243, 237, 227, 0.15);
    color: #F3EDE3; font-size: 11px;
    padding: 5px 8px; border-radius: 4px; flex: 1;
  }
  .picker-card-arrows { display: flex; gap: 2px; }
  .picker-card-arrow {
    appearance: none; cursor: pointer; font-family: inherit;
    background: rgba(243, 237, 227, 0.05);
    border: 1px solid rgba(243, 237, 227, 0.12);
    color: rgba(243, 237, 227, 0.7);
    width: 24px; height: 24px;
    border-radius: 4px; font-size: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .picker-card-arrow:not(:disabled):hover { background: rgba(243, 237, 227, 0.12); }
  .picker-card-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
  .picker-card-segline {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; opacity: 0.7;
  }

  .picker-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 32px;
    border-top: 1px solid rgba(243, 237, 227, 0.08);
    background: rgba(0, 0, 0, 0.3);
    flex-shrink: 0;
  }
  .picker-footer-info {
    font-size: 12px; color: rgba(243, 237, 227, 0.6);
  }
  .picker-footer-info strong { color: #C7A668; font-weight: 600; }
  .picker-footer-btns { display: flex; gap: 8px; }

  /* ── Client modal fields ────────────────────────────────── */
  .client-fields {
    padding: 20px 32px; display: flex; flex-direction: column; gap: 14px;
  }
  .client-field { display: flex; flex-direction: column; gap: 6px; }
  .client-field-label {
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(243, 237, 227, 0.55); font-weight: 500;
  }
  .client-field-input {
    appearance: none; font-family: inherit;
    background: rgba(243, 237, 227, 0.06);
    border: 1px solid rgba(243, 237, 227, 0.18);
    color: #F3EDE3; font-size: 14px;
    padding: 10px 12px; border-radius: 5px; outline: none;
    transition: border-color 160ms;
  }
  .client-field-input:focus { border-color: #C7A668; background: rgba(199, 166, 104, 0.06); }

  /* ── Print: ocultar topbar y overlays ───────────────────── */
  @media print {
    .topbar, .picker-overlay { display: none !important; }
    .deck-area { position: static !important; }
    deck-stage { top: 0 !important; }
  }
</style>
<script type="application/json" id="speaker-notes">
[
  "Portada. Saludo, agradezco el tiempo. Esta propuesta está hecha específicamente para el cliente.",
  "Posicionamiento: Olfativa no es un proveedor de aromas. Somos infraestructura olfativa.",
  "Pilares: las garantías que sostienen la propuesta. Adaptados al segmento.",
  "Curaduría: Manuela y la dirección creativa propia.",
  "Metodología: las fases que eliminan la incertidumbre.",
  "Aromas: la arquitectura olfativa por tier o el aroma curado.",
  "Catálogo: los equipos que operamos.",
  "Cotización: alcance y términos.",
  "Cumplimiento: certificaciones y trazabilidad documentada.",
  "Confianza: las marcas que ya operan con nosotros.",
  "Cierre: próximo paso es la sesión de inmersión. Vigencia 30 días."
]
</script>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</html>
