<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olfativa · Arquitectura Microsoft Teams</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teams-purple: #6264A7;
    --teams-dark: #201F1E;
    --teams-sidebar: #242132;
    --teams-sidebar-hover: #3D3A57;
    --teams-sidebar-active: #464775;
    --teams-white: #FFFFFF;
    --teams-gray: #F3F2F1;
    --teams-light-gray: #EDEBE9;
    --teams-border: #E1DFDD;
    --teams-text: #252423;
    --teams-secondary: #605E5C;
    --std-blue: #0078D4;
    --std-light: #EFF6FC;
    --priv-red: #A4262C;
    --priv-light: #FDE7E9;
    --fut-gray: #797775;
    --fut-light: #F3F2F1;
    --post-green: #107C10;
    --post-light: #DFF6DD;
    --hilo-orange: #C55A11;
    --hilo-light: #FFF4CE;
    --fase1-color: #0078D4;
    --fase2-color: #5C2D91;
    --connector-bg: #E8F4FD;
    --connector-text: #0078D4;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1B1A19;
    color: var(--teams-text);
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Activity Rail ── */
  .rail {
    width: 56px;
    background: var(--teams-sidebar);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 4px;
    border-right: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  .rail-logo {
    width: 32px;
    height: 32px;
    background: #6264A7;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 8px;
  }

  .rail-item {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
  }

  .rail-item:hover { background: rgba(255,255,255,0.1); }
  .rail-item.active { background: rgba(100,100,167,0.5); color: white; }
  .rail-item.active::before {
    content: '';
    position: absolute;
    left: -6px;
    width: 3px;
    height: 20px;
    background: white;
    border-radius: 0 3px 3px 0;
  }

  .rail-icon { font-size: 18px; }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    background: var(--teams-sidebar);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    border-right: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 14px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .sidebar-title {
    color: white;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .sidebar-subtitle {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    margin-top: 2px;
  }

  .teams-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .teams-list::-webkit-scrollbar { width: 4px; }
  .teams-list::-webkit-scrollbar-track { background: transparent; }
  .teams-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  .phase-label {
    color: rgba(255,255,255,0.3);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 14px 4px;
  }

  .team-item {
    padding: 6px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 0;
    transition: background 0.12s;
    position: relative;
  }

  .team-item:hover { background: rgba(255,255,255,0.06); }

  .team-item.active {
    background: var(--teams-sidebar-active);
  }

  .team-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--teams-purple);
    border-radius: 0 2px 2px 0;
  }

  .team-avatar {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .team-info { flex: 1; min-width: 0; }

  .team-name {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .team-item.active .team-name { color: white; font-weight: 600; }

  .team-meta {
    color: rgba(255,255,255,0.35);
    font-size: 10px;
    margin-top: 1px;
  }

  .team-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .badge-f1 { background: rgba(0,120,212,0.25); color: #6CAEE0; }
  .badge-f2 { background: rgba(92,45,145,0.3); color: #B39DDB; }
  .badge-temp { background: rgba(200,130,40,0.25); color: #E8A740; }
  .badge-new { background: rgba(16,124,16,0.25); color: #5EAA5E; }

  /* ── Main Content ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #FAFAF9;
    overflow: hidden;
  }

  .main-header {
    background: white;
    border-bottom: 1px solid var(--teams-border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header-avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .header-info { flex: 1; }

  .header-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--teams-text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-meta {
    font-size: 11px;
    color: var(--teams-secondary);
    margin-top: 1px;
  }

  .header-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
  }

  .header-actions {
    display: flex;
    gap: 4px;
  }

  .header-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    border-radius: 4px;
    cursor: pointer;
    color: var(--teams-secondary);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-btn:hover { background: var(--teams-light-gray); }

  /* ── Channel Content ── */
  .channel-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 24px;
  }

  .channel-content::-webkit-scrollbar { width: 6px; }
  .channel-content::-webkit-scrollbar-track { background: transparent; }
  .channel-content::-webkit-scrollbar-thumb { background: var(--teams-border); border-radius: 3px; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--teams-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  /* ── Channel Card ── */
  .channel-card {
    background: white;
    border: 1px solid var(--teams-border);
    border-radius: 8px;
    overflow: hidden;
    transition: box-shadow 0.15s, border-color 0.15s;
  }

  .channel-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    border-color: var(--teams-purple);
  }

  .card-header {
    padding: 12px 14px 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border-bottom: 1px solid var(--teams-light-gray);
  }

  .channel-icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .icon-std { background: var(--std-light); }
  .icon-priv { background: var(--priv-light); }
  .icon-fut { background: var(--fut-light); }

  .card-title-area { flex: 1; min-width: 0; }

  .card-channel-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--teams-text);
    line-height: 1.3;
    word-break: break-word;
  }

  .card-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 5px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 10px;
    line-height: 1.4;
  }

  .badge-std { background: var(--std-light); color: var(--std-blue); }
  .badge-priv { background: var(--priv-light); color: var(--priv-red); }
  .badge-fut { background: var(--fut-light); color: var(--fut-gray); border: 1px dashed #ccc; }
  .badge-post { background: var(--post-light); color: var(--post-green); }
  .badge-hilo { background: var(--hilo-light); color: var(--hilo-orange); }
  .badge-connector { background: #EFF6FF; color: #2563EB; }

  /* ── Card Body ── */
  .card-body {
    padding: 12px 14px;
  }

  .card-desc {
    font-size: 12px;
    color: var(--teams-secondary);
    line-height: 1.55;
    margin-bottom: 10px;
  }

  .card-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-label {
    font-size: 9.5px;
    font-weight: 700;
    color: var(--teams-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .meta-value {
    font-size: 11.5px;
    color: var(--teams-text);
    font-weight: 500;
    line-height: 1.35;
  }

  .meta-value .notif-icon { margin-right: 3px; }

  /* ── Protocol Box ── */
  .protocol-box {
    background: #F8F7FF;
    border: 1px solid #E8E6FF;
    border-radius: 6px;
    padding: 8px 10px;
    margin-top: 10px;
  }

  .protocol-label {
    font-size: 9.5px;
    font-weight: 700;
    color: var(--teams-purple);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .protocol-text {
    font-size: 11px;
    color: #3D3B54;
    line-height: 1.6;
  }



  /* ── Matrix Layout ── */
  .channels-matrix {
    background: white;
    border: 1px solid var(--teams-border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .matrix-row {
    display: flex;
    align-items: flex-start;
    border-bottom: 1px solid var(--teams-light-gray);
    transition: background 0.12s;
    min-height: 52px;
  }

  .matrix-row:last-child { border-bottom: none; }
  .matrix-row:hover { background: #F8F7FF; }

  .matrix-row-canal {
    width: 260px;
    flex-shrink: 0;
    padding: 13px 16px;
    border-right: 1px solid var(--teams-light-gray);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .matrix-canal-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--teams-text);
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .matrix-canal-icon { font-size: 14px; flex-shrink: 0; }

  .matrix-canal-meta {
    font-size: 10.5px;
    color: var(--teams-secondary);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .meta-dot { color: var(--teams-border); }

  .matrix-obj {
    flex: 1;
    padding: 13px 16px;
    font-size: 12px;
    color: var(--teams-secondary);
    line-height: 1.6;
    border-right: 1px solid var(--teams-light-gray);
  }

  .matrix-alert {
    font-size: 11px;
    color: #7A4F00;
    background: #FFF9F0;
    border: 1px solid #FFE0A6;
    border-radius: 4px;
    padding: 3px 7px;
    margin-top: 5px;
    display: inline-block;
  }

  .matrix-ant {
    width: 170px;
    flex-shrink: 0;
    padding: 13px 14px;
    font-size: 11px;
    color: #A19F9D;
    line-height: 1.5;
    font-style: italic;
  }

  .matrix-header {
    display: flex;
    background: #F3F2F1;
    border-bottom: 2px solid var(--teams-border);
  }

  .matrix-header-canal { width: 260px; padding: 8px 16px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--teams-secondary); border-right: 1px solid var(--teams-border); flex-shrink: 0; }
  .matrix-header-obj { flex: 1; padding: 8px 16px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--teams-secondary); border-right: 1px solid var(--teams-border); }
  .matrix-header-ant { width: 170px; padding: 8px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--teams-secondary); flex-shrink: 0; }

  .formato-inline {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 600;
  }
  /* ── Formato Post Box ── */
  .formato-box {
    background: var(--formato-bg, #FFF4CE);
    border: 1px solid var(--formato-border, #FFE0A6);
    border-radius: 6px;
    padding: 7px 10px;
    margin-top: 8px;
  }
  .formato-label {
    font-size: 9.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }
  .formato-template {
    font-size: 10px;
    opacity: 0.75;
    margin-bottom: 4px;
    font-family: monospace;
  }
  .formato-example {
    font-size: 11px;
    font-family: monospace;
    line-height: 1.5;
    font-weight: 500;
  }
  /* ── Alert Box ── */
  .alert-box {
    background: #FFF9F0;
    border: 1px solid #FFE0A6;
    border-radius: 6px;
    padding: 7px 10px;
    margin-top: 8px;
    font-size: 11px;
    color: #7A4F00;
    line-height: 1.5;
    display: flex;
    gap: 5px;
  }


  /* ── Objetivo Box ── */
  .objetivo-box {
    background: #F0FFF4;
    border: 1px solid #B7EBC8;
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }
  .objetivo-label {
    font-size: 9.5px;
    font-weight: 700;
    color: #107C10;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .objetivo-text {
    font-size: 11px;
    color: #1A4D1A;
    line-height: 1.6;
  }
  /* ── Overview Panel ── */
  .overview {
    background: white;
    border: 1px solid var(--teams-border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 16px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .overview-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--teams-purple);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--teams-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  .overview-divider {
    width: 1px;
    height: 36px;
    background: var(--teams-border);
  }

  .overview-note {
    flex: 1;
    font-size: 11.5px;
    color: var(--teams-secondary);
    line-height: 1.5;
    min-width: 200px;
  }

  /* ── Governance Bar ── */
  .gov-bar {
    background: linear-gradient(135deg, #6264A7 0%, #464775 100%);
    color: white;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .gov-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 150px;
  }

  .gov-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.7;
  }

  .gov-value {
    font-size: 12px;
    font-weight: 500;
    opacity: 0.95;
  }

  /* ── Notification legend ── */
  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--teams-secondary);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Scrollbar in channel-content */
  .channel-content::-webkit-scrollbar { width: 6px; }

  /* Animación de entrada */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .channel-card { animation: fadeIn 0.2s ease both; }
  .channel-card:nth-child(2) { animation-delay: 0.03s; }
  .channel-card:nth-child(3) { animation-delay: 0.06s; }
  .channel-card:nth-child(4) { animation-delay: 0.09s; }
  .channel-card:nth-child(5) { animation-delay: 0.12s; }
  .channel-card:nth-child(6) { animation-delay: 0.15s; }

  /* Mobile hint */
  @media (max-width: 700px) {
    .sidebar { width: 0; overflow: hidden; }
    .channels-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Rail -->
  <div class="rail">
    <div class="rail-logo">O</div>
    <div class="rail-item" id="railDashboard" title="Dashboard · Por qué cambiamos" onclick="showDashboard()">
      <span class="rail-icon">🏠</span>
    </div>
    <div class="rail-item" id="railRoadmap" title="Roadmap · La ruta a 2027" onclick="showRoadmap()">
      <span class="rail-icon">🗺️</span>
    </div>
    <div class="rail-item active" id="railEquipos" title="Equipos" onclick="showEquipos()">
      <span class="rail-icon">⊞</span>
    </div>
    <div class="rail-item" id="railGuia" title="Guía · Post vs Hilo" onclick="showGuia()">
      <span class="rail-icon">💡</span>
    </div>
    <div class="rail-item" id="railReglas" title="Reglas de Oro" onclick="showReglas()">
      <span class="rail-icon">⭐</span>
    </div>
    <div class="rail-item" id="railCopilot" title="Copilot · Prompts" onclick="showCopilot()">
      <span class="rail-icon">🤖</span>
    </div>
    <div class="rail-item" id="railNotif" title="Notificaciones · Configuración" onclick="showNotif()">
      <span class="rail-icon">🔔</span>
    </div>
    <div class="rail-item" id="railGlosario" title="Glosario" onclick="showGlosario()">
      <span class="rail-icon">📖</span>
    </div>
    <div class="rail-item" id="railReuniones" title="Reuniones · Grabación · Copilot" onclick="showReuniones()">
      <span class="rail-icon">🎥</span>
    </div>
    <div class="rail-item" id="railFormatos" title="Formatos de Post" onclick="showFormatos()">
      <span class="rail-icon">📐</span>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Microsoft Teams</div>
      <div class="sidebar-subtitle">Arquitectura PRIME · Olfativa</div>
    </div>
    <div class="teams-list" id="teamsList"></div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="main-header" id="mainHeader">
      <div style="color: #605E5C; font-size:13px;">← Selecciona un equipo</div>
    </div>
    <div class="channel-content" id="channelContent"></div>
  </div>

</div>

<script>
const TEAMS_DATA = [
  {
    id: "gestion_cambio",
    name: "Gestión del Cambio",
    emoji: "🔄",
    color: "#0078D4",

function renderSidebar() {
  const list = document.getElementById('teamsList');
  let html = '';
  TEAMS_DATA.forEach(team => { html += renderTeamItem(team); });
  list.innerHTML = html;
  list.querySelectorAll('.team-item').forEach(el => {
    el.addEventListener('click', () => {
      list.querySelectorAll('.team-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      showTeam(el.dataset.id);
    });

function renderTeamItem(team) {
  return `
    <div class="team-item" data-id="${team.id}">
      <div class="team-avatar" style="background:${team.color}">${team.emoji}</div>
      <div class="team-info">
        <div class="team-name">${team.name}</div>
        <div class="team-meta">${team.channels.length} canales</div>
      </div>

    </div>
  `;
}

function getTipoIcon(tipo) {
  if (tipo === 'Estándar') return '🔓';
  if (tipo === 'Privado') return '🔒';
  return '🔗';
}

function getFormatoIcon(fmt) {
  return fmt === 'Post' ? '📌' : '🧵';
}

function getNotifIcon(notif) {
  if (notif.includes('Todas')) return '🔔';
  if (notif.includes('@menciones')) return '🔕';
  if (notif.includes('personalizada')) return '🔔';
  return '🔕';
}

function getNotifShort(notif) {
  if (notif.includes('Todas las')) return 'Toda la actividad';
  if (notif.includes('Solo @menciones')) return 'Solo @menciones';
  if (notif.includes('@menciones del canal')) return '@menciones';
  if (notif.includes('personalizada')) return 'Personalizada';
  return notif;
}

  const stdCount = team.channels.filter(c => c.tipo === 'Estándar').length;

  const postCount = team.channels.filter(c => c.formato === 'Post').length;

  let connectorsHtml = connectors.length > 0 ? connectors.map(c => `<span class="badge badge-connector">⚡ ${c}</span>`).join('') : '<span style="color:#A19F9D;font-size:11px;">Sin conectores</span>';

    const badgeTypoClass = isFut ? 'badge-fut' : ch.tipo === 'Estándar' ? 'badge-std' : 'badge-priv';

    const alertHtml = ch.alerta ? `<div class="matrix-alert">⚠️ ${ch.alerta}</div>` : '';

        <td style="font-family:monospace;font-size:11px;font-weight:600;color:${c.text};white-space:nowrap;padding:6px 10px;border-bottom:1px solid ${c.border}40;vertical-align:top">${f.name}</td>
        <td style="font-size:11.5px;color:#252423;padding:6px 10px;border-bottom:1px solid ${c.border}40;vertical-align:top">${f.desc}</td>
        <td style="font-size:11px;color:#605E5C;font-style:italic;padding:6px 10px;border-bottom:1px solid ${c.border}40;vertical-align:top">${f.vals}</td>
      </tr>`).join('');

    const ejsHtml = t.ejemplos.map(e => `
      <div style="font-family:monospace;font-size:11px;color:${c.dark};line-height:1.7;padding:2px 0">
        ${e.txt} <span style="color:#A19F9D;font-size:10px;font-family:sans-serif">← ${e.canal}</span>
      </div>`).join('');

    const canalesHtml = t.canales.map(ch =>
      `<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:white;border:1px solid #E1DFDD;color:#605E5C">${ch}</span>`
    ).join('');

    const formulaHtml = t.campos.map((f, i) => {
      const isDate = f.name === 'FECHA';
      const isFixed = f.name === 'TIPO' || (t.num === 1 && i === 0);
      const bg = isDate ? '#EFF6FC' : isFixed ? c.bg : 'white';
      const border = isDate ? '1px solid #BAE0F7' : isFixed ? `1px solid ${c.border}` : '1px solid #E1DFDD';
      const color = isDate ? '#0C447C' : isFixed ? c.text : '#252423';
      return `<span style="background:${bg};border:${border};color:${color};padding:4px 10px;border-radius:6px;font-family:monospace;font-size:11px;font-weight:600">${f.name}</span>${i < t.campos.length - 1 ? '<span style="color:#A19F9D;padding:0 6px;font-size:13px">|</span>' : ''}`;
    }).join('');

    html += `
    <div style="background:white;border:1px solid #E1DFDD;border-radius:10px;overflow:hidden;margin-bottom:16px">
      <div style="background:${c.bg};padding:12px 16px;border-bottom:1px solid ${c.border}60;display:flex;align-items:center;gap:10px">
        <span style="background:${c.text};color:white;font-size:12px;font-weight:700;padding:3px 11px;border-radius:20px">${t.num}</span>
        <div>
          <div style="font-size:14px;font-weight:600;color:${c.dark}">${t.title}</div>
          <div style="font-size:11px;color:${c.text};margin-top:1px">${t.subtitle}</div>
        </div>
        <div style="margin-left:auto;font-size:11px;color:${c.text};font-weight:500">${t.campos.length} campos</div>
      </div>
      <div style="padding:14px 16px">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:0;margin-bottom:14px;line-height:2.4">${formulaHtml}</div>
        <table style="width:100%;border-collapse:collapse;margin-bottom:14px">
          <tr>
            <th style="text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#605E5C;padding:4px 10px;border-bottom:1px solid #E1DFDD">Campo</th>
            <th style="text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#605E5C;padding:4px 10px;border-bottom:1px solid #E1DFDD">Qué va aquí</th>
            <th style="text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#605E5C;padding:4px 10px;border-bottom:1px solid #E1DFDD">Valores posibles</th>
          </tr>
          ${camposHtml}
        </table>
        <div style="background:#FAFAF9;border:1px solid #E1DFDD;border-radius:8px;padding:10px 14px;margin-bottom:12px">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#605E5C;margin-bottom:6px">Ejemplos reales</div>
          ${ejsHtml}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${canalesHtml}</div>
      </div>
    </div>`;
  });

  // Fecha rule
  const fechaHtml = fechas.map(f => `
    <div style="flex:1;min-width:130px;background:white;border:1px solid #BAE0F7;border-radius:8px;padding:8px 12px">
      <div style="font-family:monospace;font-size:12px;color:#0C447C;font-weight:600">${f.fmt}</div>
      <div style="font-size:10.5px;color:#605E5C;margin-top:3px">${f.desc}</div>
    </div>`).join('');

  html += `
    <div style="border:1px solid #E1DFDD;border-radius:10px;padding:13px 16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#605E5C;margin-bottom:10px">📅 Fecha — siempre al final, elige una granularidad</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${fechaHtml}</div>
    </div>`;

  document.getElementById('channelContent').innerHTML = `<div style="padding:20px 24px 28px">${html}</div>`;
}


renderSidebar();
showDashboard();
</script>
</body>
</html>
